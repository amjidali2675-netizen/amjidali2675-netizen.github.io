<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LunarMC - Store</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background: radial-gradient(circle at top,#1a0033,#0a0014);
color:white;
text-align:center;
overflow-x:hidden;
}

/* NAVBAR */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
}

nav h1{
color:#c77dff;
font-size:26px;
}

nav a{
color:white;
margin-left:25px;
text-decoration:none;
transition:0.3s;
}

nav a:hover{
color:#c77dff;
}

/* HEADER */
header{
padding:150px 20px 80px;
}

h2{
font-size:40px;
color:#c77dff;
margin-bottom:10px;
}

/* CARD STORE */
.store{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
padding:50px;
}

.card{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:20px;
width:280px;
transition:0.3s;
backdrop-filter:blur(5px);
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 25px #c77dff;
}

/* TITOLI VIP */
.vip{color:#00e5ff;}
.gold{color:#ffd700;}
.diamond{color:#00ffff;}

/* PREZZO */
.price{
font-size:28px;
margin:15px 0;
}

/* BOTTONE */
.buy{
display:inline-block;
padding:12px 30px;
background:#7b2cbf;
border-radius:30px;
text-decoration:none;
color:white;
font-weight:bold;
transition:0.3s;
}

.buy:hover{
background:#9d4edd;
box-shadow:0 0 20px #9d4edd;
}

/* FOOTER */
footer{
padding:40px;
opacity:0.6;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
<h1>LunarMC</h1>
<div>
<a href="index.html">Home</a>
<a href="staff.html">Staff</a>
<a href="store.html">Store</a>
</div>
</nav>

<header>
<h2>🛒 Store LunarMC</h2>
<p>Compra rank e supporta il server</p>
</header>

<div class="store">

<!-- VIP -->
<div class="card">
<h3 class="vip">VIP</h3>
<p>Accesso base al server</p>
<div class="price">€4.99</div>
<a href="#" class="buy">Compra</a>
</div>

<!-- GOLD -->
<div class="card">
<h3 class="gold">GOLD</h3>
<p>Vantaggi extra e comandi speciali</p>
<div class="price">€9.99</div>
<a href="#" class="buy">Compra</a>
</div>

<!-- DIAMOND -->
<div class="card">
<h3 class="diamond">DIAMOND</h3>
<p>Tutti i vantaggi + perks esclusivi</p>
<div class="price">€14.99</div>
<a href="#" class="buy">Compra</a>
</div>

</div>

<footer>© 2026 LunarMC</footer>

</body>
</html>
