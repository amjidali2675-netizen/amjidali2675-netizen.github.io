<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LunarMC</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

/* SFONDO */

body{
background: radial-gradient(circle at top,#3a0ca3,#240046,#10002b);
color:white;
}

/* STELLE */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px);
background-size:90px 90px;
opacity:0.25;
z-index:-1;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 80px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
}

/* LOGO TESTO */

nav h1{
color:#c77dff;
font-size:28px;
font-weight:800;
}

/* MENU */

nav ul{
list-style:none;
display:flex;
gap:40px;
}

nav ul li a{
text-decoration:none;
color:white;
font-weight:600;
}

nav ul li a:hover{
color:#c77dff;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h2{
font-size:70px;
color:#c77dff;
}

.hero p{
margin-top:15px;
font-size:20px;
opacity:0.8;
}

/* BOTTONI */

.buttons{
margin-top:40px;
display:flex;
gap:20px;
}

.btn{
padding:18px 50px;
border:none;
border-radius:40px;
font-size:18px;
font-weight:700;
cursor:pointer;
color:white;
}

.play{
background:linear-gradient(45deg,#9d4edd,#7b2cbf);
}

.store{
background:linear-gradient(45deg,#ffb400,#ff6a00);
}

.staff{
background:linear-gradient(45deg,#6a0cff,#b366ff);
}

/* MODALITÀ */

.section{
padding:120px 40px;
text-align:center;
}

.section h3{
font-size:40px;
margin-bottom:60px;
color:#c77dff;
}

.modes{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.card{
background:rgba(255,255,255,0.05);
padding:40px;
width:260px;
border-radius:20px;
}

.card h4{
margin-bottom:10px;
color:#c77dff;
}

/* FOOTER */

footer{
text-align:center;
padding:40px;
opacity:0.7;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav>

<h1>LunarMC</h1>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="staff.html">Staff</a></li>
<li><a href="store.html">Store</a></li>
</ul>

</nav>

<!-- HERO -->

<div class="hero">

<h2>LunarMC</h2>

<p>Server Minecraft PvP</p>

<div class="buttons">

<button class="btn play" onclick="copyIP()">GIOCA ORA</button>

<a href="store.html">
<button class="btn store">STORE</button>
</a>

<a href="staff.html">
<button class="btn staff">STAFF</button>
</a>

</div>

</div>

<!-- MODALITA -->

<div class="section">

<h3>Modalità</h3>

<div class="modes">

<div class="card">
<h4>⚔ Practice</h4>
<p>Duelli PvP competitivi</p>
</div>

<div class="card">
<h4>🛏 BedWars</h4>
<p>Difendi il tuo letto</p>
</div>

<div class="card">
<h4>🏝 SkyWars</h4>
<p>Combatti sulle isole</p>
</div>

</div>

</div>

<footer>

© 2026 LunarMC

</footer>

<script>

function copyIP(){
navigator.clipboard.writeText("play.lunarmc.it");
alert("IP copiato!");
}

</script>

</body>
</html>
