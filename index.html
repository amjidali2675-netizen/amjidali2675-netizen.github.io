<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LunarMC</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

/* SFONDO */

body{
background: radial-gradient(circle at top,#3a0ca3,#1a0033 40%,#050010);
color:white;
text-align:center;
min-height:100vh;
}

/* STELLE */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px,transparent 1px),
radial-gradient(white 1px,transparent 1px);
background-size:80px 80px;
opacity:0.2;
z-index:-1;
}

/* LOGO */

.logo{
width:170px;
margin-top:120px;
margin-bottom:20px;
border-radius:25px;
animation:float 3s ease-in-out infinite;
}

/* ANIMAZIONE LOGO */

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-12px);}
100%{transform:translateY(0);}
}

/* IP */

.ip{
font-size:22px;
margin-bottom:30px;
opacity:0.9;
}

/* PULSANTE PLAY */

.play-btn{
display:inline-block;
padding:18px 70px;
border-radius:40px;
font-size:22px;
font-weight:bold;
background:linear-gradient(90deg,#9d4edd,#7b2cbf);
cursor:pointer;
transition:0.3s;
}

.play-btn:hover{
transform:scale(1.05);
box-shadow:0 0 30px #9d4edd;
}

/* SEZIONE */

.section{
margin-top:120px;
}

/* TITOLO */

.section h2{
font-size:42px;
margin-bottom:50px;
}

/* CARDS */

.cards{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

/* CARD */

.card{
background:rgba(255,255,255,0.05);
padding:40px;
width:280px;
border-radius:20px;
transition:0.3s;
backdrop-filter:blur(10px);
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 25px #7b2cbf;
}

.card h3{
font-size:28px;
color:#c77dff;
margin-bottom:10px;
}

.card p{
opacity:0.8;
}

/* FOOTER */

footer{
margin-top:100px;
padding:30px;
opacity:0.5;
font-size:15px;
}

</style>

</head>

<body>

<!-- LOGO -->

<img src="logo.png" class="logo">

<!-- IP -->

<div class="ip">IP: play.tuoserver.it</div>

<!-- PLAY BUTTON -->

<div class="play-btn" onclick="copyIP()">PLAY NOW</div>

<!-- MODALITA -->

<div class="section">

<h2>Modalità</h2>

<div class="cards">

<div class="card">
<h3>Practice</h3>
<p>Duelli PvP competitivi.</p>
</div>

<div class="card">
<h3>Bedwars</h3>
<p>Modalità classica.</p>
</div>

</div>

</div>

<footer>
© 2026 LunarMC
</footer>

<script>

function copyIP(){
navigator.clipboard.writeText("play.tuoserver.it");
alert("IP copiato!");
}

</script>

</body>
</html>
